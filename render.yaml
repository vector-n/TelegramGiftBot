services:
  - type: worker
    name: telegram-gift-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: TARGET_CHANNELS
        sync: false
      - key: SOURCE_CHANNELS
        sync: false
      - key: PHONE_NUMBER
        sync: false
      - key: POST_DELAY_MINUTES
        value: "30"
      - key: AUTO_POST
        value: "true"
      - key: REQUIRE_APPROVAL
        value: "false"
      - key: TIMEZONE
        value: "Asia/Riyadh"
      - key: PYTHONUNBUFFERED
        value: "1"
